name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies (backend)
        working-directory: services/backend
        run: pnpm install --frozen-lockfile

      - name: Tests (backend)
        working-directory: services/backend
        run: pnpm test

      - name: Install dependencies (frontend)
        working-directory: services/frontend
        run: pnpm install --frozen-lockfile

      - name: Tests (frontend)
        working-directory: services/frontend
        run: pnpm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: services/backend
          file: services/backend/prod.dockerfile
          push: true
          tags: ghcr.io/quentindrms/proprieto-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: services/frontend
          file: services/frontend/prod.dockerfile
          push: true
          tags: ghcr.io/quentindrms/proprieto-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose -f ~/proprieto/compose.prod.yml pull
            docker compose -f ~/proprieto/compose.prod.yml up -d --remove-orphans
